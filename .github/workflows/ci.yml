name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.12"
  # Pepper is required for tenant key hashing; CI-only value, do not reuse.
  SENTINEL_KEY_PEPPER: "ci-only-not-a-real-pepper-never-reuse"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check sentinel/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,flask,fastapi]" || pip install -e "."
          pip install pytest
      - name: Run tests
        run: |
          pytest tests/ -q --tb=short \
            --ignore=tests/test_llm_live.py \
            --ignore=tests/test_integration.py \
            -k "not multiturn_attack"
